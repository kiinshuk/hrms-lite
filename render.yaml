services:
  - type: web
    name: hrms-lite-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn hrms.wsgi"
    envVars:
      - key: DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-lite-db
          property: connectionString

databases:
  - name: hrms-lite-db
    databaseName: hrms_lite
    user: hrms_user
    plan: free
